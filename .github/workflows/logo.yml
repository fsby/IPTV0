name: Logo Update
env:
  TZ: Asia/Shanghai
  LOGO_DIR: "logo"
  FILE_EXT: "png"
  MIN_FILE_SIZE: "1k"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5'
jobs:
  sync-logo:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 初始化logo目录
        run: mkdir -p "$LOGO_DIR" && chmod 755 "$LOGO_DIR"

      - name: 同步Logo文件（以上面仓库为准，同名文件保留最先出现的）
        run: |
          set -euo pipefail
          # 配置格式：仓库URL|源目录列表(逗号分隔)
          # 仓库优先级：从上到下，先出现的仓库文件优先保留
          REPOS=(
            "https://github.com/fanmingming/live|tv"
            "https://github.com/zzzz0317/beijing-unicom-iptv-playlist|img,logo"
            "https://github.com/wanglindl/TVlogo|img"
            "https://github.com/mytv-android/myTVlogo|img"
            "https://github.com/sumingyd/IPTV-Scanner-Editor-Pro|logo"
            "https://github.com/drangjchen/IPTV|Logo"
          )
          
          for REPO in "${REPOS[@]}"; do
            IFS='|' read -r URL SRC_DIRS <<< "$REPO"
            TEMP_DIR="temp_repo_$(echo "$URL" | md5sum | cut -c1-8)"
            
            echo "处理仓库：$URL"
            # 克隆仓库（不包含 .git 目录，只拉取文件）
            git clone --depth 1 --filter=blob:none --no-checkout "$URL" "$TEMP_DIR" 2>/dev/null || { 
              echo "克隆失败，跳过"; 
              continue; 
            }
            
            [ ! -d "$TEMP_DIR" ] && continue
            
            cd "$TEMP_DIR"
            # 初始化 sparse-checkout 但不创建 .git 目录（实际无法完全避免，但可以最小化）
            git sparse-checkout init --cone 2>/dev/null || true
            
            # 拆分源目录列表，循环处理每个目录
            IFS=',' read -ra DIR_LIST <<< "$SRC_DIRS"
            for DIR in "${DIR_LIST[@]}"; do
              # 去除首尾空格
              DIR=$(echo "$DIR" | xargs)
              echo "  处理目录：$DIR"
              
              # 设置 sparse-checkout
              git sparse-checkout set "$DIR" 2>/dev/null || { 
                echo "    目录 $DIR 不存在，跳过"; 
                continue; 
              }
              
              # 检出文件
              git checkout 2>/dev/null || { 
                echo "    检出失败"; 
                continue; 
              }
              
              # 复制文件：仅当目标文件不存在时才复制（保持优先级）
              find "$DIR" -name "*.$FILE_EXT" -type f -size +"$MIN_FILE_SIZE" 2>/dev/null | while read -r file; do
                filename=$(basename "$file")
                target="../../$LOGO_DIR/$filename"
                if [ ! -f "$target" ]; then
                  cp -f "$file" "$target"
                  echo "    已添加：$filename"
                else
                  echo "    已跳过（文件已存在）：$filename"
                fi
              done
            done
            
            cd ../..
            # 清理临时仓库（包括其中的 .git 目录）
            rm -rf "$TEMP_DIR"
          done
          
          # 清理最终目录中的小文件
          find "$LOGO_DIR" -type f -name "*.$FILE_EXT" ! -size +"$MIN_FILE_SIZE" -delete
          
          echo "同步完成，当前 logo 目录文件数：$(find "$LOGO_DIR" -name "*.$FILE_EXT" | wc -l)"
          
      - name: 暂存文件
        run: git add "$LOGO_DIR/"*.${FILE_EXT}
        continue-on-error: true
        
      - name: 拉取最新代码并提交推送
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --name-only | grep -q .; then
            git fetch origin main
            git commit -m "Logo Update: $(date +'%Y-%m-%d %H:%M') (CST)"
            git push origin HEAD:$GITHUB_REF_NAME --force
            echo "✅ 拉取最新代码并强制推送完成"
          else
            echo "ℹ️ 无文件变更，跳过提交和推送"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理临时文件
        if: always()
        run: rm -rf temp_repo_* 2>/dev/null
